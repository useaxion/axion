name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --verbose

      - name: Test (lib)
        run: cargo test --lib --verbose

      - name: Clippy
        run: cargo clippy --lib -- -D warnings

      - name: Check generated TypeScript types are up to date
        # Regenerate types + fix import paths, then fail if any tracked file
        # changed. See docs/type-generation.md for the full regeneration steps.
        run: |
          cargo test --lib
          node scripts/fix-generated-types.mjs
          git diff --exit-code sdk/src/types/

  typescript:
    name: TypeScript
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --workspaces --if-present
